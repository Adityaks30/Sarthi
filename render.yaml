services:
  # Backend NestJS service
  - type: web
    name: sarthi-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sarthi-db
          property: connectionString

databases:
  - name: sarthi-db
    plan: free
    postgresMajorVersion: 15

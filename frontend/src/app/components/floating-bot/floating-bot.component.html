<div class="fixed bottom-24 right-6 z-[60] flex flex-col items-end">
  
  <!-- Chat Window -->
  <div *ngIf="isOpen" class="w-80 sm:w-96 h-[450px] bg-slate-900 border border-white/10 rounded-3xl shadow-2xl flex flex-col overflow-hidden backdrop-blur-xl mb-4 transition-all duration-300">
    <!-- Header -->
    <div class="p-4 bg-amber-500 text-slate-950 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <span class="text-xl">🤖</span>
        <div>
          <span class="block text-xs font-black uppercase tracking-wider">Sarthi AI Assistant</span>
          <span class="block text-[8px] opacity-75 font-semibold">Online & ready to help</span>
        </div>
      </div>
      <button (click)="toggleChat()" class="text-slate-950 hover:opacity-75 font-black cursor-pointer text-sm">✕</button>
    </div>

    <!-- Messages Log -->
    <div class="flex-1 overflow-y-auto p-4 space-y-3.5 scrollbar-thin">
      <div *ngFor="let msg of messages" class="flex" [class.justify-end]="msg.sender === 'user'">
        <div class="max-w-[80%] p-3 rounded-2xl text-xs leading-relaxed"
             [class.bg-slate-800]="msg.sender === 'bot'"
             [class.text-slate-200]="msg.sender === 'bot'"
             [class.bg-amber-500]="msg.sender === 'user'"
             [class.text-slate-950]="msg.sender === 'user'">
          {{ msg.text }}
          <span class="block text-[8px] text-right mt-1 opacity-60">{{ msg.time | date:'shortTime' }}</span>
        </div>
      </div>
    </div>

    <!-- Input Form -->
    <form (submit)="sendMessage()" class="p-3 border-t border-white/5 flex gap-2 bg-slate-950/50">
      <input type="text" [(ngModel)]="userMessage" name="userMessage" placeholder="Ask a question..." class="flex-1 bg-slate-950 border border-white/5 rounded-xl px-3.5 py-2.5 text-xs text-white placeholder-slate-600 focus:outline-none focus:border-amber-500" />
      <button type="submit" class="px-4 py-2.5 rounded-xl bg-amber-500 hover:bg-amber-600 text-slate-950 text-xs font-bold uppercase transition-colors cursor-pointer">
        Send
      </button>
    </form>
  </div>

  <!-- Floating Toggle Button -->
  <button (click)="toggleChat()" class="w-14 h-14 bg-amber-500 hover:bg-amber-600 text-slate-950 rounded-full flex items-center justify-center shadow-2xl hover:scale-105 transition-all duration-200 cursor-pointer" title="Ask AI Chatbot">
    <span class="text-2xl" *ngIf="!isOpen">🤖</span>
    <span class="text-xl font-bold" *ngIf="isOpen">✕</span>
  </button>
</div>
